# =============================================================================
#  docker-compose.prod.yml  —  BẢN TRIỂN KHAI SIẾT CHẶT (production-like)
# -----------------------------------------------------------------------------
#  Đây là "fix ý 2": KÍN TÒA NHÀ, chỉ chừa cửa ra đường cho đúng phòng cần thiết.
#
#  Khác duy nhất so với docker-compose.yml (dev) là PHẦN MẠNG (ports) — KIẾN TRÚC
#  (M4) GIỮ NGUYÊN. Đây chính là bằng chứng "cùng kiến trúc, khác triển khai".
#
#  Nguyên tắc:
#    - CHỈ Gateway phơi ra IP công khai           → ports: 8000   (cửa vào DUY NHẤT)
#    - Keycloak phơi CHỌN LỌC (token/JWKS)         → ports: 8081  (prod thật: sau ingress
#                                                     chỉ mở /protocol/..., chặn /admin)
#    - Vault / Redis / Prometheus / Grafana / Jaeger: KHÔNG có "ports:"
#         → chúng chỉ tồn tại bằng IP riêng 172.x trong mạng gw-net,
#           Internet KHÔNG chạm tới được. Service nội bộ vẫn gọi nhau bằng tên.
#
#  Chạy:   docker compose -f infra/docker-compose.prod.yml up -d
# =============================================================================

services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    volumes:
      - ../idp-config:/opt/keycloak/data/import
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    # ⚠️ NỬA: chỉ cần mở endpoint token/JWKS cho client/gateway. Ở prod thật, đặt
    # sau reverse-proxy/ingress chỉ cho qua /realms/<realm>/protocol/openid-connect/*
    # và CHẶN /admin (admin console không bao giờ phơi ra Internet).
    ports: ["8081:8080"]

  redis:
    image: redis:7-alpine
    # ❌ BỊT CỬA RA ĐƯỜNG — không có "ports:". Redis chỉ nghe trong mạng gw-net.
    # Lý do: ai chạm được Redis là xóa được nonce (mở đường replay RP1-IG) và xóa
    # được jti blacklist (token đã thu hồi sống lại — SEC-10).

  vault:
    image: hashicorp/vault:1.15
    command: server -dev
    container_name: infra-vault-1
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    # ❌ BỊT CỬA RA ĐƯỜNG — không có "ports:". Vault chỉ nghe trong mạng gw-net.
    # Lý do: đây là KHO BÍ MẬT, quý nhất — tuyệt đối không phơi ra ngoài.
    # (Prod thật còn phải: storage backend thật, sealed + auto-unseal KMS, token
    #  least-privilege thay cho dev-root-token — đó là phần hardening riêng.)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault-seed:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        vault kv put secret/gateway/hmac/dev-key-01 value="dev-shared-secret"
        vault kv put secret/gateway/hmac/prod-key-01 value="prod-shared-secret-32bytes-min!!"
        vault kv put secret/gateway/hs256 value="hs256-realm-shared-secret-32b!!"
        echo "vault seed done"
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    # ❌ BỊT CỬA RA ĐƯỜNG — quan sát nội bộ, chỉ admin xem (qua VPN/bastion, không Internet).
    depends_on: [gateway]

  jaeger:
    image: jaegertracing/all-in-one:1.55
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    # ❌ BỊT CỬA RA ĐƯỜNG — gateway vẫn gửi trace tới jaeger:4318 trong mạng nội bộ;
    # UI 16686 không phơi ra ngoài (lộ trace = info disclosure).

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Prod thật: tắt anonymous, mật khẩu mạnh từ secret store.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/gateway.json:ro
    # ❌ BỊT CỬA RA ĐƯỜNG — dashboard nội bộ, chỉ admin xem.
    depends_on: [prometheus]

  gateway:
    build: ../gateway
    # ✅ CỬA DUY NHẤT RA ĐƯỜNG. Prod thật: đặt sau reverse-proxy/ingress giữ TLS
    # (HTTPS chấm dứt ở ingress), rồi chuyển tiếp vào cổng 8000 này qua mạng nội bộ.
    ports: ["8000:8000"]
    depends_on:
      keycloak: { condition: service_started }
      redis: { condition: service_started }
      vault: { condition: service_healthy }
      jaeger: { condition: service_started }
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT: secret
      HMAC_VAULT_PATH: gateway/hmac/{key_id}
      OTEL_SERVICE_NAME: secure-api-gateway
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces

networks:
  default:
    name: gw-net
