# =============================================================================
#  docker-compose.ngrok.yml  —  Chay stack local + phoi ra Internet qua ngrok
# -----------------------------------------------------------------------------
#  Y tuong: stack chay tren may ban; service 'edge' (Caddy) gom Keycloak+Gateway
#  ve 1 cong HTTP (host 8080); ngrok tunnel cong 8080 -> URL HTTPS cong khai.
#
#  KIEN TRUC (M4) GIU NGUYEN — chi doi cach phoi ra ngoai (M5).
#
#  Chay (tu thu muc infra/, sau khi tao .env tu .env.ngrok.example):
#     docker compose -f docker-compose.ngrok.yml up -d --build
#     ngrok http --url=https://<NGROK_DOMAIN> 8080
# =============================================================================

services:
  # --- Edge gom Keycloak+Gateway ve 1 cong; ngrok tunnel cong nay ---
  edge:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "8080:80"   # ngrok se tunnel cong host 8080 nay
    volumes:
      - ./Caddyfile.ngrok:/etc/caddy/Caddyfile:ro
    depends_on: [gateway, keycloak]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm
    volumes:
      - ../idp-config:/opt/keycloak/data/import
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Keycloak dung sau ngrok+Caddy: phat token co issuer = https://<domain>/realms/nt219
      KC_HOSTNAME: ${NGROK_DOMAIN}
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
    # KHONG publish: chi truy cap qua edge (/realms/*).

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # KHONG publish (internal-only).

  vault:
    image: hashicorp/vault:1.15
    restart: unless-stopped
    command: server -dev
    container_name: infra-vault-1
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    # KHONG publish (internal-only).
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault-seed:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        vault kv put secret/gateway/hmac/dev-key-01 value="dev-shared-secret"
        vault kv put secret/gateway/hmac/prod-key-01 value="prod-shared-secret-32bytes-min!!"
        vault kv put secret/gateway/hs256 value="hs256-realm-shared-secret-32b!!"
        echo "vault seed done"
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on: [gateway]
    # KHONG publish (internal-only).

  jaeger:
    image: jaegertracing/all-in-one:1.55
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI Jaeger xem local (chi tren may ban, khong qua ngrok)

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/gateway.json:ro
    ports: ["3001:3000"]   # dashboard xem local
    depends_on: [prometheus]

  gateway:
    build: ../gateway
    restart: unless-stopped
    # KHONG publish 8000: chi nhan request tu edge trong gw-net.
    depends_on:
      keycloak: { condition: service_started }
      redis: { condition: service_started }
      vault: { condition: service_healthy }
      jaeger: { condition: service_started }
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      # issuer token = domain ngrok (Keycloak phat qua edge). Phai khop token that.
      JWT_ISSUER: https://${NGROK_DOMAIN}/realms/nt219
      # Gateway fetch JWKS noi bo (nhanh). Demo "JWKS qua TLS" la client tai qua URL ngrok.
      JWKS_URL: http://keycloak:8080/realms/nt219/protocol/openid-connect/certs
      JWT_AUDIENCE: account
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT: secret
      HMAC_VAULT_PATH: gateway/hmac/{key_id}
      OTEL_SERVICE_NAME: secure-api-gateway
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces

networks:
  default:
    name: gw-net
