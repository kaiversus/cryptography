# =============================================================================
#  docker-compose.cloud.yml  —  TRIEN KHAI CLOUD (1 VM) + HTTPS toan he thong
# -----------------------------------------------------------------------------
#  Khac docker-compose.prod.yml: them service 'edge' (Caddy) lam CUA DUY NHAT
#  ra Internet voi cert Let's Encrypt that. Gateway/Keycloak/Vault/Redis/quan sat
#  KHONG publish cong -> chi song trong gw-net.
#
#  KIEN TRUC (M4) GIU NGUYEN — chi doi cau hinh trien khai (M5). Bang chung
#  "cung kien truc, khac trien khai".
#
#  Chay (tu thu muc infra/, sau khi tao .env tu .env.cloud.example):
#     docker compose -f docker-compose.cloud.yml up -d --build
# =============================================================================

services:
  # --- CUA DUY NHAT ra Internet: Caddy giu TLS (Let's Encrypt) ---
  edge:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"     # ACME HTTP-01 challenge cua Let's Encrypt
      - "443:443"   # HTTPS (client noi chuyen o day)
    environment:
      GATEWAY_DOMAIN: ${GATEWAY_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile.cloud:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # luu cert -> song qua restart (tranh rate-limit LE)
      - caddy_config:/config
    networks:
      default:
        # Alias = domain that -> gateway goi https://<domain>/realms/.../certs (KB9)
        # se resolve ve chinh container edge trong noi bo (cert CN khop).
        aliases:
          - ${GATEWAY_DOMAIN}
    depends_on: [gateway, keycloak]

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm
    volumes:
      - ../idp-config:/opt/keycloak/data/import
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Keycloak dung sau reverse-proxy: tin X-Forwarded-* de phat token co
      # issuer = https://<domain>/realms/nt219 (khop JWT_ISSUER cua gateway).
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
    # KHONG publish cong: chi truy cap qua edge (/realms/*). Admin console khong phoi.

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # KHONG publish: ai cham Redis = xoa nonce (replay) / xoa jti blacklist (SEC-10).

  vault:
    image: hashicorp/vault:1.15
    restart: unless-stopped
    command: server -dev
    container_name: infra-vault-1
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    # KHONG publish: kho bi mat, quy nhat. (TLS+policy least-priv = hardening Tier 2.)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault-seed:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        vault kv put secret/gateway/hmac/dev-key-01 value="dev-shared-secret"
        vault kv put secret/gateway/hmac/prod-key-01 value="prod-shared-secret-32bytes-min!!"
        vault kv put secret/gateway/hs256 value="hs256-realm-shared-secret-32b!!"
        echo "vault seed done"
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.51.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on: [gateway]
    # KHONG publish: quan sat noi bo, xem qua SSH tunnel/bastion.

  jaeger:
    image: jaegertracing/all-in-one:1.55
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    # KHONG publish: gateway gui trace toi jaeger:4318 noi bo; UI xem qua SSH tunnel.

  grafana:
    image: grafana/grafana:10.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana-dashboard.json:/var/lib/grafana/dashboards/gateway.json:ro
    depends_on: [prometheus]
    # KHONG publish: dashboard noi bo, xem qua SSH tunnel.

  gateway:
    build: ../gateway
    restart: unless-stopped
    # KHONG publish 8000: chi nhan request tu edge (Caddy) trong gw-net.
    depends_on:
      keycloak: { condition: service_started }
      redis: { condition: service_started }
      vault: { condition: service_healthy }
      jaeger: { condition: service_started }
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      # issuer token = domain HTTPS (Keycloak phat qua edge). Phai khop token that.
      JWT_ISSUER: https://${GATEWAY_DOMAIN}/realms/nt219
      # KB9: fetch JWKS QUA TLS (domain resolve noi bo ve edge nho network alias).
      JWKS_URL: https://${GATEWAY_DOMAIN}/realms/nt219/protocol/openid-connect/certs
      JWT_AUDIENCE: account
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
      VAULT_MOUNT: secret
      HMAC_VAULT_PATH: gateway/hmac/{key_id}
      OTEL_SERVICE_NAME: secure-api-gateway
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://jaeger:4318/v1/traces

volumes:
  caddy_data:
  caddy_config:

networks:
  default:
    name: gw-net
